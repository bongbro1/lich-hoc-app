name: Build iOS Raw IPA
on:
  push:
    branches:
      - main

jobs:
  build-raw-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npx expo prebuild --platform ios --clean



      - name: Build Xcode Project (Unsigned)
        run: |
          # 1. Chạy pod install thủ công nếu Expo prebuild bỏ qua nó
          cd ios
          if [ ! -d *.xcworkspace ]; then
            echo "⚠️ No .xcworkspace found, running pod install..."
            pod install
          fi
          cd ..

          # 2. Tìm scheme name động để tránh lỗi sai tên dự án
          SCHEME_NAME=$(basename ios/*.xcodeproj .xcodeproj)
          echo "🚀 Found Scheme Name: $SCHEME_NAME"

          # 3. Tìm workspace path động để tránh lỗi wildcard không mở rộng
          WORKSPACE_PATH=$(ls -d ios/*.xcworkspace | head -n 1)
          echo "🚀 Found Workspace: $WORKSPACE_PATH"
          
          # 4. Dùng "clean build" kết hợp tắt chữ ký
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
                     ANY_WARNINGS_AS_ERRORS=NO \
                     clean build

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/output/Payload
          # Sao chép file .app trực tiếp từ thư mục build của Xcode vào Payload
          cp -r build_output/Build/Products/Release-iphoneos/*.app build/output/Payload/
          cd build/output
          zip -r App-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lich-Hoc-App-Raw
          path: build/output/App-Unsigned.ipa
