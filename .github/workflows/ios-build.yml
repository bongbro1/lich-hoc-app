name: Build iOS Raw IPA
on:
  push:
    branches:
      - main

jobs:
  build-raw-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
      RCT_NEW_ARCH_ENABLED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Node Modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install npm dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Generate iOS directory (No Install)
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Configure Podfile and Install Pods
        run: |
          cd ios
          # Patch Podfile bằng Ruby để giải quyết lỗi mô-đun hóa Firebase, nâng target lên 14.0 và loại bỏ cờ lỗi trong BoringSSL/gRPC trên Xcode 16
          ruby -e '
            podfile = File.read("Podfile")
            podfile = "use_modular_headers!\n" + podfile
            patch = %q{
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "14.0"
                end
                
                # Sửa lỗi Xcode 16 compiler flag trong BoringSSL-GRPC và gRPC
                if target.name == "BoringSSL-GRPC" || target.name == "gRPC-C++"
                  target.source_build_phase.files.each do |file|
                    if file.settings && file.settings["COMPILER_FLAGS"]
                      flags = file.settings["COMPILER_FLAGS"].split
                      flags.reject! { |flag| flag == "-GCC_WARN_INHIBIT_ALL_WARNINGS" }
                      file.settings["COMPILER_FLAGS"] = flags.join(" ")
                    end
                  end
                end
              end
            }
            podfile.gsub!(/post_install do \|installer\|/, "post_install do |installer|\n" + patch)
            File.write("Podfile", podfile)
          '
          
          # Tiến hành cài đặt CocoaPods với cập nhật repo để đảm bảo tải đúng module map
          pod install --repo-update
          cd ..

      - name: Build Xcode Project (Unsigned)
        run: |
          # 1. Tìm scheme name động để tránh lỗi sai tên dự án
          SCHEME_NAME=$(basename ios/*.xcodeproj .xcodeproj)
          echo "🚀 Found Scheme Name: $SCHEME_NAME"

          # 2. Tìm workspace path động để tránh lỗi wildcard không mở rộng
          WORKSPACE_PATH=$(ls -d ios/*.xcworkspace | head -n 1)
          echo "🚀 Found Workspace: $WORKSPACE_PATH"
          
          # 3. Dùng "clean build" kết hợp tắt chữ ký (loại bỏ cờ chặn cảnh báo gây lỗi ScanDependencies trên Xcode 16)
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     clean build

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/output/Payload
          # Sao chép file .app trực tiếp từ thư mục build của Xcode vào Payload
          cp -r build_output/Build/Products/Release-iphoneos/*.app build/output/Payload/
          cd build/output
          zip -r App-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lich-Hoc-App-Raw
          path: build/output/App-Unsigned.ipa
