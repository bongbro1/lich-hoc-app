name: Build iOS Raw IPA
on:
  push:
    branches:
      - main

jobs:
  build-raw-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          sed -i '' "1s/^/use_modular_headers!\n/" Podfile
          export RCT_NEW_ARCH_ENABLED=1
          pod install

      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "LchHc" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
                     ANY_WARNINGS_AS_ERRORS=NO \
                     clean archive -archivePath build/App.xcarchive

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/output/Payload
          cp -r build/App.xcarchive/Products/Applications/*.app build/output/Payload/
          cd build/output
          zip -r App-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lich-Hoc-App-Raw
          path: build/output/App-Unsigned.ipa
